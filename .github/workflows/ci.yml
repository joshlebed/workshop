name: CI

# CI bills by job-minute (Ubuntu standard, rounded up). The previous fan-out
# (8–9 parallel jobs each paying ~30s of pnpm/node setup) cost ~9 billable
# minutes per run for ~30s of actual checking. This shape is collapsed:
#   - One `quality` job installs deps once and runs every node-based check
#     sequentially: lint, typecheck, test, knip, prettier (md), redesign-plan
#     consistency, actionlint, terraform fmt+validate.
#   - `mobile-bundle` and `migrate-smoke` stay separate (heavier or different
#     deps — Metro export and a Postgres service container).
#   - `gitleaks` only runs on push-to-main and a weekly schedule (pre-commit
#     lefthook is the PR-time guard; CI is the safety net).
#   - PRs own full validation; push-to-main only re-checks the canonical-branch
#     concerns (gitleaks always, migrate-smoke on migration changes). Skipping
#     the duplicate full PR re-run on merge cuts roughly half the CI bill.
#   - Docs-only PRs skip the workflow entirely via `paths-ignore`.
#   - Draft PRs skip the heavy jobs entirely. Agents (Niteshift,
#     /continue-redesign) push 2–10 commits to a draft before flipping to
#     ready-for-review; each push otherwise burned ~2 billable min on `quality`.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".prettierrc.json"
      - ".prettierignore"
  push:
    branches: [main]
  schedule:
    - cron: "0 12 * * 1" # Mondays 12:00 UTC — weekly gitleaks sweep

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # paths-filter outputs gate `mobile-bundle` and `migrate-smoke`. Runs on
  # both pull_request and push so push-to-main can also skip migrate-smoke
  # when a deploy doesn't touch migrations.
  changes:
    name: Detect changes
    if: github.event_name != 'schedule' && github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read # dorny/paths-filter needs this on PRs
    outputs:
      mobile: ${{ steps.filter.outputs.mobile }}
      migrations: ${{ steps.filter.outputs.migrations }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            mobile:
              - 'apps/workshop/**'
              - 'packages/shared/**'
              - 'pnpm-lock.yaml'
            migrations:
              - 'apps/backend/drizzle/**'
              - 'apps/backend/src/db/**'
              - 'pnpm-lock.yaml'

  # Combined quality job — install deps once, run every node-based check.
  # PR-only: push-to-main relies on the merge being a fast-forward of an
  # already-green PR head. If the merge introduces drift (rare; merge commits
  # don't change file content), the next PR will catch it.
  quality:
    name: Quality (lint, typecheck, test, knip, format, terraform, actionlint)
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-pnpm

      - name: Lint (biome)
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

      - name: Knip (unused code/deps)
        run: pnpm run knip

      - name: Prettier (markdown)
        run: pnpm run format:md:check

      - name: Redesign-plan status consistency
        run: node scripts/check-redesign-plan-status.mjs

      - name: actionlint
        uses: raven-actions/actionlint@205b530c5d9fa8f44ae9ed59f341a0db994aa6f8 # v2

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: 1.14.7

      # Cache provider plugins (~8 MB AWS provider) keyed on the lock file.
      # Without this, every run re-downloads on `terraform init`. Saves
      # ~10–15s per quality run, which often tips a 60s+10s run back under
      # the 60s billable boundary.
      - name: Cache Terraform plugins
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.terraform.d/plugin-cache
          key: tf-plugins-${{ runner.os }}-${{ hashFiles('infra/.terraform.lock.hcl') }}

      - name: terraform fmt
        working-directory: infra
        run: terraform fmt -check -recursive

      - name: terraform validate (offline, no backend)
        working-directory: infra
        env:
          TF_PLUGIN_CACHE_DIR: ~/.terraform.d/plugin-cache
        run: |
          mkdir -p ~/.terraform.d/plugin-cache
          # Skip HCP backend for validation so PRs from forks can run.
          terraform init -backend=false
          terraform validate

  # Guards against the RN-drift bug class. Heavy enough (Expo export) to
  # justify its own job. PR-only — the merge commit doesn't change content.
  mobile-bundle:
    name: Mobile Metro bundle
    needs: changes
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false && needs.changes.outputs.mobile == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-pnpm

      # Scoped on purpose — a full `expo install --check` also flags react/
      # typescript, which the monorepo intentionally pins above the SDK-preferred
      # versions. RN + its satellites are the ones that must track the SDK.
      - name: Verify RN deps match Expo SDK
        working-directory: apps/workshop
        run: |
          pnpm exec expo install --check \
            react-native \
            react-native-gesture-handler \
            react-native-reanimated \
            react-native-safe-area-context \
            react-native-screens \
            react-native-worklets

      - name: Bundle iOS (Metro codegen smoke)
        working-directory: apps/workshop
        run: pnpm exec expo export --platform ios --output-dir dist-ci

  # Guards against the migration-drift bug class. Spins up Postgres, applies,
  # re-applies (must be a no-op). Runs on PRs that touch migrations AND on
  # push-to-main when migrations changed (canonical-branch safety net).
  migrate-smoke:
    name: Migrate smoke (fresh DB + idempotent re-run)
    needs: changes
    if: github.event.pull_request.draft != true && needs.changes.outputs.migrations == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: workshop
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      STAGE: local
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/workshop
      # 32+ char placeholder; migrate never reads it, but config.ts validates length.
      SESSION_SECRET: ci_migrate_smoke_session_secret_padding_32
      AWS_REGION: us-east-1
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-pnpm

      - name: Journal ↔ file consistency
        working-directory: apps/backend
        run: node ../../scripts/check-drizzle-journal.mjs

      - name: Apply migrations (fresh DB)
        working-directory: apps/backend
        run: pnpm run db:migrate

      - name: Re-apply migrations (must be a no-op)
        working-directory: apps/backend
        run: pnpm run db:migrate

      - name: Verify journal row count
        env:
          PGPASSWORD: postgres
        run: |
          set -euo pipefail
          applied=$(psql -h localhost -U postgres -d workshop -tAc \
            "select count(*) from drizzle.__drizzle_migrations")
          expected=$(find apps/backend/drizzle -maxdepth 1 -name '*.sql' | wc -l)
          echo "applied=$applied expected=$expected"
          test "$applied" = "$expected"

  # Pre-commit lefthook runs gitleaks on staged files for any developer with
  # the binary installed. CI is the safety net: scan on every push to main
  # (catches anything that bypassed pre-commit) and weekly to catch drift /
  # rule-set updates against the full history.
  gitleaks:
    name: gitleaks
    if: github.event_name == 'push' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read # gitleaks-action lists commits via the GitHub API
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
