name: TestFlight (native iOS build)

# Manual trigger only — EAS Build burns free-tier quota, so we don't auto-run
# on every merge. Native changes (new native libs, config plugin changes,
# version bumps) need this. JS-only changes go through deploy-mobile.yml.

on:
  workflow_dispatch:
    inputs:
      submit:
        description: "Submit to TestFlight after build?"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

permissions:
  contents: read

jobs:
  build:
    name: EAS Build iOS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with: { version: 10.19.0 }

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Cache hoisted node_modules
        id: nm-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install deps
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Build and optionally submit
        working-directory: apps/workshop
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
          SUBMIT: ${{ inputs.submit }}
        run: |
          npx eas-cli@latest build \
            --platform ios \
            --profile production \
            --non-interactive \
            --wait

          if [ "$SUBMIT" = "true" ]; then
            npx eas-cli@latest submit \
              --platform ios \
              --latest \
              --non-interactive
          fi
