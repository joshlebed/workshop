name: TestFlight (native iOS build)

# Runs on main. @expo/fingerprint hashes everything that affects the native
# binary (native deps, config plugins, app.json, assets wired up as icons/
# splash, etc.). If the hash differs from the last successful build, this
# builds a new .ipa and auto-submits to TestFlight. Otherwise it's a no-op
# and deploy-mobile.yml ships the change via EAS Update.
#
# Last-built fingerprint is stored as a git tag (ios-fp-<hash>) — durable,
# free, and visible in the repo.

on:
  push:
    branches: [main]
    paths:
      - "apps/workshop/**"
      - "packages/shared/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/testflight.yml"
  workflow_dispatch:
    inputs:
      force:
        description: "Build even if fingerprint is unchanged"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

concurrency:
  group: testflight
  cancel-in-progress: false # in-flight builds cost EAS minutes — never cancel

permissions:
  contents: write # push fingerprint tag after a successful build

jobs:
  fingerprint:
    name: Check fingerprint
    runs-on: ubuntu-latest
    outputs:
      hash: ${{ steps.fp.outputs.hash }}
      build_needed: ${{ steps.decide.outputs.build_needed }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # need tags for the compare

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with: { version: 10.19.0 }

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Cache hoisted node_modules
        id: nm-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install deps
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Compute iOS fingerprint
        id: fp
        working-directory: apps/workshop
        run: |
          HASH=$(node -e "require('@expo/fingerprint').createProjectHashAsync('.').then(h => process.stdout.write(h))")
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "iOS fingerprint: $HASH"

      - name: Decide whether to build
        id: decide
        env:
          FP_HASH: ${{ steps.fp.outputs.hash }}
          FORCE: ${{ inputs.force }}
        run: |
          TAG="ios-fp-$FP_HASH"
          if [ "$FORCE" = "true" ]; then
            echo "Force build requested"
            echo "build_needed=true" >> "$GITHUB_OUTPUT"
          elif git rev-parse --verify "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Fingerprint already built ($TAG) — skipping"
            echo "build_needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "New fingerprint — build needed"
            echo "build_needed=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: EAS Build + TestFlight submit
    needs: fingerprint
    if: needs.fingerprint.outputs.build_needed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with: { version: 10.19.0 }

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Cache hoisted node_modules
        id: nm-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install deps
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Build and auto-submit to TestFlight
        working-directory: apps/workshop
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
        run: |
          npx eas-cli@latest build \
            --platform ios \
            --profile production \
            --auto-submit \
            --non-interactive \
            --wait

      - name: Tag successful fingerprint
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FP_HASH: ${{ needs.fingerprint.outputs.hash }}
        run: |
          TAG="ios-fp-$FP_HASH"
          git tag "$TAG"
          git push origin "$TAG"
