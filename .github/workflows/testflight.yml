name: TestFlight (native iOS build)

# Runs on main. @expo/fingerprint hashes everything that affects the native
# binary (native deps, config plugins, app.json, assets wired up as icons/
# splash, etc.). If the hash differs from the last successful build, this
# enqueues a new EAS build with `--no-wait --auto-submit` and exits — the
# build + TestFlight submit happen entirely on EAS infrastructure (no GH
# Actions polling time burned waiting ~30 minutes per build):
#
#   fingerprint  →  enqueue (build + auto-submit) + tag
#
# We tag the fingerprint immediately on successful enqueue. That's a
# deliberate trade: a build that succeeds queue-up but fails on EAS
# (build/submit infra error, signing drift, etc.) won't trigger a rebuild
# on the next push if the fingerprint is unchanged. Recovery for that case:
#
#   git tag -d ios-fp-<hash> && git push origin :refs/tags/ios-fp-<hash>
#   gh workflow run testflight.yml --ref main --field force=true
#
# The savings vs `--wait` are large: ~400–500 Actions minutes/month on the
# main-branch build cadence. EAS dashboard is the source of truth for build
# status; this workflow only handles the enqueue.

on:
  push:
    branches: [main]
    paths:
      - "apps/workshop/**"
      - "packages/shared/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/testflight.yml"
  workflow_dispatch:
    inputs:
      force:
        description: "Build even if fingerprint is unchanged"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

# Concurrency is split per-job:
#   - fingerprint: cheap to redo. cancel-in-progress=true so a rapid-fire
#     stack of pushes only runs the fingerprint check once (the latest one).
#     This was the source of stuck-queue minute-burn (11 cancelled runs /
#     154 min wall-clock in a 6-day window): rapid pushes piled up behind
#     a slow fingerprint and each waited for its turn before being killed.
#   - enqueue: NEVER cancel — once `eas build` returns, the EAS-side build
#     is already queued on EAS infra. Cancelling the GH job orphans the tag
#     write, but the build itself proceeds.
# No workflow-level concurrency; the job-level groups are what matter.

permissions:
  contents: write # push fingerprint tag after successful enqueue

# Pin eas-cli to a known-good version so EAS releases don't silently change
# the JSON schema of `eas build --json` (which the build job parses) or the
# behaviour of `--non-interactive`. Bump deliberately.
env:
  EAS_CLI_VERSION: "18.8.1"

jobs:
  fingerprint:
    name: Check fingerprint
    runs-on: ubuntu-latest
    # Fingerprint is cheap and idempotent. Bursty merges should collapse to
    # one fingerprint run on the latest SHA, not pile up.
    concurrency:
      group: testflight-fingerprint
      cancel-in-progress: true
    # Hard cap: a fingerprint job that hasn't completed in 4 minutes is
    # almost certainly stuck (Expo registry / pnpm install hang). Kill it
    # rather than letting it block enqueues for 10 minutes.
    timeout-minutes: 4
    outputs:
      hash: ${{ steps.fp.outputs.hash }}
      build_needed: ${{ steps.decide.outputs.build_needed }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # need tags for the compare

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with: { version: 10.19.0 }

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc

      - name: Cache hoisted node_modules
        id: nm-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install deps
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Compute iOS fingerprint
        id: fp
        working-directory: apps/workshop
        run: |
          HASH=$(node -e "require('@expo/fingerprint').createProjectHashAsync('.').then(h => process.stdout.write(h))")
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "iOS fingerprint: $HASH"

      - name: Decide whether to build
        id: decide
        env:
          FP_HASH: ${{ steps.fp.outputs.hash }}
          FORCE: ${{ inputs.force }}
        run: |
          TAG="ios-fp-$FP_HASH"
          if [ "$FORCE" = "true" ]; then
            echo "Force build requested"
            echo "build_needed=true" >> "$GITHUB_OUTPUT"
            {
              echo "## 🟢 Build needed"
              echo ""
              echo "**Reason**: \`force=true\` workflow_dispatch input."
              echo ""
              echo "**Fingerprint**: \`$FP_HASH\`"
            } >> "$GITHUB_STEP_SUMMARY"
          elif git rev-parse --verify "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Fingerprint already built ($TAG) — skipping"
            echo "build_needed=false" >> "$GITHUB_OUTPUT"
            {
              echo "## 🟡 Skipped — no native change"
              echo ""
              echo "**Fingerprint**: \`$FP_HASH\`"
              echo ""
              echo "Already built (tag \`$TAG\` exists). Did not consume an EAS Build minute."
              echo "OTA changes ship via \`Deploy Mobile (OTA)\` instead. Force a rebuild via"
              echo "\`gh workflow run testflight.yml --ref main --field force=true\`."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "New fingerprint — build needed"
            echo "build_needed=true" >> "$GITHUB_OUTPUT"
            {
              echo "## 🟢 Build needed"
              echo ""
              echo "**Reason**: new iOS fingerprint."
              echo ""
              echo "**Fingerprint**: \`$FP_HASH\`"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  enqueue:
    name: Enqueue EAS build (--no-wait --auto-submit)
    needs: fingerprint
    if: needs.fingerprint.outputs.build_needed == 'true'
    runs-on: ubuntu-latest
    # NEVER cancel an in-flight enqueue: once `eas build` returns, the build
    # is already queued on EAS, and cancelling here only loses the fingerprint
    # tag write. New pushes wait their turn behind any active enqueue.
    concurrency:
      group: testflight-enqueue
      cancel-in-progress: false
    # Stop-loss: a successful enqueue completes in ~1–2 minutes. 5 minutes
    # is enough headroom for slow EAS API responses without burning Actions
    # minutes when EAS is down.
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with: { version: 10.19.0 }

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc

      - name: Cache hoisted node_modules
        id: nm-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install deps
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      # `--no-wait` returns as soon as EAS accepts the job (~1–2 min) instead
      # of polling for the full ~30–40 min build. `--auto-submit` chains the
      # TestFlight submit on EAS's side after the build succeeds. Both happen
      # on EAS infra — no GH Actions minutes burned for either.
      - name: Enqueue build + auto-submit
        id: build
        working-directory: apps/workshop
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
          EXPO_PUBLIC_APPLE_SERVICES_ID: dev.josh.workshop.web
          EXPO_PUBLIC_GOOGLE_IOS_CLIENT_ID: 267582241036-cpnoae8vhaj8e3ftq3lmldef2c7hco33.apps.googleusercontent.com
          EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: 267582241036-vpbho0utb64bpvsjhkkk0cv14lp0dbie.apps.googleusercontent.com
          CLI_VERSION: ${{ env.EAS_CLI_VERSION }}
        run: |
          set -euo pipefail
          BUILD_JSON=$(npx "eas-cli@$CLI_VERSION" build \
            --platform ios \
            --profile production \
            --non-interactive \
            --no-wait \
            --auto-submit \
            --json)
          # `eas build --json` returns an array; the [0]th element is this build.
          BUILD_ID=$(echo "$BUILD_JSON" | jq -r '.[0].id')
          if [ -z "$BUILD_ID" ] || [ "$BUILD_ID" = "null" ]; then
            echo "Failed to extract build ID from eas build output:"
            echo "$BUILD_JSON"
            exit 1
          fi
          echo "build_id=$BUILD_ID" >> "$GITHUB_OUTPUT"
          {
            echo "## 🟢 Build enqueued"
            echo ""
            echo "**Build ID**: \`$BUILD_ID\`"
            echo ""
            echo "[View build on EAS](https://expo.dev/accounts/joshlebed/projects/workshop/builds/$BUILD_ID)"
            echo ""
            echo "EAS will build then auto-submit to TestFlight. Both run on EAS"
            echo "infra — no GH Actions polling time consumed. Monitor status on"
            echo "the EAS dashboard or in App Store Connect."
          } >> "$GITHUB_STEP_SUMMARY"

      # Tag immediately on successful enqueue. Trade-off: an EAS-side build
      # or submit failure won't auto-rebuild on the next push with the same
      # fingerprint. Recovery: delete the tag locally + remote, then dispatch
      # with `force=true`. See workflow header comment for the exact commands.
      - name: Tag enqueued fingerprint
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FP_HASH: ${{ needs.fingerprint.outputs.hash }}
        run: |
          TAG="ios-fp-$FP_HASH"
          git tag "$TAG"
          git push origin "$TAG"
