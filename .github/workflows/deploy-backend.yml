name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "apps/backend/**"
      - "packages/shared/**"
      - "infra/**"
      - ".github/workflows/deploy-backend.yml"
      - "package.json"
      - "pnpm-lock.yaml"
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: true

permissions:
  id-token: write # OIDC to AWS
  contents: read

jobs:
  # Skip the migrate job when this push doesn't touch a migration. Migrations
  # are idempotent so re-running them is safe, but it costs ~30s per deploy and
  # widens the window for a transient SSM/Postgres failure to fail an unrelated
  # code-only deploy. workflow_dispatch always runs migrate (safe default).
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      migrations: ${{ steps.filter.outputs.migrations }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            migrations:
              - 'apps/backend/drizzle/**'
              - 'apps/backend/src/db/**'

  terraform:
    name: Read Terraform outputs
    runs-on: ubuntu-latest
    outputs:
      lambda_name: ${{ steps.out.outputs.lambda_name }}
      db_url_param: ${{ steps.out.outputs.db_url_param }}
      log_group: ${{ steps.out.outputs.log_group }}
      api_url: ${{ steps.out.outputs.api_url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: 1.14.7
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      # `terraform apply` is intentionally run from a dev laptop, not CI. The
      # CI role is scoped to code deploys only (see infra/iam_github_oidc.tf).
      # We init here only to read HCP state for the outputs below.
      - name: terraform init
        working-directory: infra
        run: terraform init

      - name: Capture outputs
        id: out
        working-directory: infra
        run: |
          {
            echo "lambda_name=$(terraform output -raw lambda_function_name)"
            echo "db_url_param=$(terraform output -raw db_url_ssm_param)"
            echo "log_group=$(terraform output -raw cloudwatch_log_group)"
            echo "api_url=$(terraform output -raw api_url)"
          } >> "$GITHUB_OUTPUT"

  migrate:
    name: Run DB migrations
    needs: [terraform, changes]
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.migrations == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - uses: ./.github/actions/setup-pnpm

      - name: Fetch DB URL from SSM
        id: ssm
        env:
          DB_URL_PARAM: ${{ needs.terraform.outputs.db_url_param }}
        run: |
          DB_URL=$(aws ssm get-parameter \
            --name "$DB_URL_PARAM" \
            --with-decryption \
            --query Parameter.Value --output text)
          echo "::add-mask::$DB_URL"
          echo "DB_URL=$DB_URL" >> "$GITHUB_ENV"

      - name: Apply migrations
        working-directory: apps/backend
        env:
          STAGE: prod
          DATABASE_URL: ${{ env.DB_URL }}
          SESSION_SECRET: dummy_for_migrate_only_not_used_padding_to_32
          AWS_REGION: us-east-1
        run: pnpm run db:migrate

  deploy:
    name: Build + upload Lambda
    needs: [terraform, migrate]
    # Run when terraform succeeded and migrate either succeeded or was skipped
    # (no migration changes). Without `always()` a skipped migrate would also
    # skip deploy, blocking every code-only push.
    if: always() && needs.terraform.result == 'success' && needs.migrate.result != 'failure' && needs.migrate.result != 'cancelled'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-pnpm

      - name: Bundle Lambda
        working-directory: apps/backend
        run: pnpm run build

      - uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Upload to Lambda
        env:
          LAMBDA_NAME: ${{ needs.terraform.outputs.lambda_name }}
        run: |
          aws lambda update-function-code \
            --function-name "$LAMBDA_NAME" \
            --zip-file fileb://apps/backend/lambda.zip \
            --publish
          aws lambda wait function-updated \
            --function-name "$LAMBDA_NAME"

      - name: Smoke test /health
        env:
          API_URL: ${{ needs.terraform.outputs.api_url }}
        run: |
          set -euo pipefail
          URL="$API_URL/health"
          for i in 1 2 3 4 5; do
            if curl -fsS "$URL" >/dev/null; then
              echo "health OK"
              exit 0
            fi
            echo "retry $i..."
            sleep 3
          done
          echo "health check failed"
          exit 1
