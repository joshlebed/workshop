name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "apps/backend/**"
      - "packages/shared/**"
      - "infra/**"
      - ".github/workflows/deploy-backend.yml"
      - "package.json"
      - "pnpm-lock.yaml"
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: true

permissions:
  id-token: write # OIDC to AWS
  contents: read

jobs:
  terraform:
    name: Read Terraform outputs
    runs-on: ubuntu-latest
    outputs:
      lambda_name: ${{ steps.out.outputs.lambda_name }}
      db_url_param: ${{ steps.out.outputs.db_url_param }}
      log_group: ${{ steps.out.outputs.log_group }}
      api_url: ${{ steps.out.outputs.api_url }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: 1.14.7
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      # `terraform apply` is intentionally run from a dev laptop, not CI. The
      # CI role is scoped to code deploys only (see infra/iam_github_oidc.tf).
      # We init here only to read HCP state for the outputs below.
      - name: terraform init
        working-directory: infra
        run: terraform init

      - name: Capture outputs
        id: out
        working-directory: infra
        run: |
          {
            echo "lambda_name=$(terraform output -raw lambda_function_name)"
            echo "db_url_param=$(terraform output -raw db_url_ssm_param)"
            echo "log_group=$(terraform output -raw cloudwatch_log_group)"
            echo "api_url=$(terraform output -raw api_url)"
          } >> "$GITHUB_OUTPUT"

  migrate:
    name: Run DB migrations
    needs: terraform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with: { version: 10.19.0 }

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Cache hoisted node_modules
        id: nm-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install deps
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Fetch DB URL from SSM
        id: ssm
        env:
          DB_URL_PARAM: ${{ needs.terraform.outputs.db_url_param }}
        run: |
          DB_URL=$(aws ssm get-parameter \
            --name "$DB_URL_PARAM" \
            --with-decryption \
            --query Parameter.Value --output text)
          echo "::add-mask::$DB_URL"
          echo "DB_URL=$DB_URL" >> "$GITHUB_ENV"

      - name: Apply migrations
        working-directory: apps/backend
        env:
          STAGE: prod
          DATABASE_URL: ${{ env.DB_URL }}
          SESSION_SECRET: dummy_for_migrate_only_not_used_padding_to_32
          SES_FROM_ADDRESS: noreply@example.com
          AWS_REGION: us-east-1
        run: pnpm run db:migrate

  deploy:
    name: Build + upload Lambda
    needs: [terraform, migrate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with: { version: 10.19.0 }

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Cache hoisted node_modules
        id: nm-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install deps
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Bundle Lambda
        working-directory: apps/backend
        run: pnpm run build

      - uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Upload to Lambda
        env:
          LAMBDA_NAME: ${{ needs.terraform.outputs.lambda_name }}
        run: |
          aws lambda update-function-code \
            --function-name "$LAMBDA_NAME" \
            --zip-file fileb://apps/backend/lambda.zip \
            --publish
          aws lambda wait function-updated \
            --function-name "$LAMBDA_NAME"

      - name: Smoke test /health
        env:
          API_URL: ${{ needs.terraform.outputs.api_url }}
        run: |
          set -euo pipefail
          URL="$API_URL/health"
          for i in 1 2 3 4 5; do
            if curl -fsS "$URL" >/dev/null; then
              echo "health OK"
              exit 0
            fi
            echo "retry $i..."
            sleep 3
          done
          echo "health check failed"
          exit 1
