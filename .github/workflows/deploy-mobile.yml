name: Deploy Mobile (OTA)

on:
  push:
    branches: [main]
    paths:
      - "apps/workshop/**"
      - "packages/shared/**"
      - ".github/workflows/deploy-mobile.yml"
  workflow_dispatch:

concurrency:
  group: deploy-mobile
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ota:
    name: Publish EAS Update
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with: { version: 10.19.0 }

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Cache hoisted node_modules
        id: nm-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install deps
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Publish JS bundle via EAS Update
        working-directory: apps/workshop
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          npx eas-cli@latest update \
            --auto \
            --branch production \
            --message "ci: $COMMIT_SHA"
