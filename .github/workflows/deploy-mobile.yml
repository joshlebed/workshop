name: Deploy Mobile (OTA)

on:
  push:
    branches: [main]
    paths:
      - "apps/workshop/**"
      - "packages/shared/**"
      - ".github/workflows/deploy-mobile.yml"
  workflow_dispatch:

concurrency:
  group: deploy-mobile
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ota:
    name: Publish EAS Update
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: 10.19.0 }

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Cache hoisted node_modules
        id: nm-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install deps
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Publish JS bundle via EAS Update
        working-directory: apps/workshop
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
        run: |
          npx eas-cli@latest update \
            --auto \
            --branch production \
            --message "ci: ${{ github.sha }}"
