name: Deploy Mobile (OTA)

on:
  push:
    branches: [main]
    paths:
      - "apps/workshop/**"
      - "packages/shared/**"
      - ".github/workflows/deploy-mobile.yml"
  workflow_dispatch:

concurrency:
  group: deploy-mobile
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ota:
    name: Publish EAS Update
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-pnpm

      # eas-cli is pinned in apps/workshop devDependencies — no `npx eas-cli@latest`
      # round-trip per run, and the version is now lockfile-pinned alongside the
      # rest of the project deps.
      - name: Publish JS bundle via EAS Update
        working-directory: apps/workshop
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
          EXPO_PUBLIC_APPLE_SERVICES_ID: dev.josh.workshop.web
          EXPO_PUBLIC_GOOGLE_IOS_CLIENT_ID: 267582241036-cpnoae8vhaj8e3ftq3lmldef2c7hco33.apps.googleusercontent.com
          EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: 267582241036-vpbho0utb64bpvsjhkkk0cv14lp0dbie.apps.googleusercontent.com
          # EXPO_PUBLIC_SENTRY_DSN is read at bundle time and embedded in the
          # JS bundle. SENTRY_AUTH_TOKEN is used by the Sentry expo plugin to
          # upload the Hermes source map to Sentry. Both are silently no-op
          # if unset — Sentry SDK skips init, source maps just don't upload.
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          pnpm exec eas update \
            --auto \
            --branch production \
            --message "ci: $COMMIT_SHA"
