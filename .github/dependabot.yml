version: 2
# Monthly cadence (down from weekly) — combined with aggressive grouping this
# keeps Dependabot CI churn under ~50 Actions minutes/month for ~3 grouped PRs.
# Bump to weekly when the dep matrix grows or when a security advisory window
# matters more than minutes.
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
      day: monday
      time: "09:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 10
    versioning-strategy: increase
    # `expo install --check` defines the supported matrix for the iOS app.
    # Dependabot must not move RN or its satellites past the SDK-pinned major —
    # it breaks Metro codegen (see docs/plans/HANDOFF.md §CI/CD unblock).
    # react-native + react-native-reanimated also fail expo-doctor on patch
    # drift (PR #98 bumped them off the SDK 55 matrix and broke CI), so ignore
    # patches there too. react/react-dom are pinned exact (e.g. 19.2.0); even
    # patch bumps fail expo-doctor, so ignore patches too. typescript follows
    # expo's `~5.9.x`. Re-open these ignores when the Expo SDK itself is bumped.
    ignore:
      - dependency-name: "react-native"
        update-types:
          ["version-update:semver-patch", "version-update:semver-minor", "version-update:semver-major"]
      - dependency-name: "react-native-gesture-handler"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
      - dependency-name: "react-native-reanimated"
        update-types:
          ["version-update:semver-patch", "version-update:semver-minor", "version-update:semver-major"]
      - dependency-name: "react-native-safe-area-context"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
      - dependency-name: "react-native-screens"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
      - dependency-name: "react-native-worklets"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
      - dependency-name: "react"
        update-types:
          ["version-update:semver-patch", "version-update:semver-minor", "version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types:
          ["version-update:semver-patch", "version-update:semver-minor", "version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]
    groups:
      # Native-side: anything that touches the iOS bundle. Kept separate so a
      # broken Metro/codegen bump can be reverted without dragging tooling.
      expo:
        patterns:
          - "expo"
          - "expo-*"
          - "@expo/*"
          - "react-native"
          - "react-native-*"
      # Backend SDK family — gets bumped every release of the AWS SDK, easy
      # to verify in one diff.
      aws-sdk:
        patterns:
          - "@aws-sdk/*"
      # Catch-all for everything that isn't native or AWS SDK. Includes
      # vitest, knip, biome, prettier, hono, zod, drizzle-*, @types/*,
      # tanstack, etc. — combining them avoids the per-dep PR fan-out that
      # was driving CI minute spend.
      tooling:
        patterns:
          - "*"
        exclude-patterns:
          - "expo"
          - "expo-*"
          - "@expo/*"
          - "react-native"
          - "react-native-*"
          - "@aws-sdk/*"
          - "react"
          - "react-dom"
          - "typescript"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      day: monday
      time: "09:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 10
    groups:
      # All GH Actions bumps in one PR — they're SHA-pinned and Dependabot
      # produces one PR per action otherwise (high noise, low value).
      actions:
        patterns:
          - "*"

  - package-ecosystem: terraform
    directory: /infra
    schedule:
      interval: monthly
      day: monday
      time: "09:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 5
    groups:
      terraform:
        patterns:
          - "*"
